name: monthly-report

# 毎月 1 日 10:17 JST = 1 日 01:17 UTC に起動。
# 前月の総括 + 業界トレンド + 中長期戦略提言を含む月報を配信。
# 注：分を 0 にすると毎時 00 分の大量実行に巻き込まれて GitHub の scheduled 遅延が
#     最大 9〜12 時間に達することがあるため、17 分を採用して負荷分散している。
on:
  schedule:
    - cron: "17 1 1 * *"
  workflow_dispatch:
    inputs:
      month_target:
        description: "対象月 (YYYY-MM, 空欄なら前月 JST)"
        required: false
        type: string

concurrency:
  group: monthly-report
  cancel-in-progress: false

permissions:
  contents: write   # keep-alive のための空コミット用

jobs:
  monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Compute target month (JST, default = previous month)
        id: vars
        run: |
          INPUT_MONTH="${{ inputs.month_target }}"
          if [ -n "$INPUT_MONTH" ]; then
            MONTH_TARGET="$INPUT_MONTH"
          else
            # 前月（実行日が 1 日でも前月を対象にする）
            MONTH_TARGET="$(date -d "$(date +%Y-%m-15) -1 month" +%Y-%m)"
          fi
          MONTH_LABEL="$(date -d "${MONTH_TARGET}-01" +'%Y年 %-m月')"
          {
            echo "MONTH_TARGET=$MONTH_TARGET"
            echo "MONTH_LABEL=$MONTH_LABEL"
          } >> "$GITHUB_ENV"
          echo "Generating monthly report for $MONTH_LABEL ($MONTH_TARGET)"

      - name: Run Claude Code (generate monthly artifacts)
        env:
          # CLI は CLAUDE_CODE_OAUTH_TOKEN を優先し、なければ ANTHROPIC_API_KEY を使う。
          # どちらか一方が Secrets に登録されていれば動く（両方未設定だと失敗する）。
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONTH_TARGET: ${{ env.MONTH_TARGET }}
          MONTH_LABEL: ${{ env.MONTH_LABEL }}
        run: |
          set -euo pipefail
          mkdir -p /tmp
          PROMPT="$(cat <<'EOF'
          あなたは morning-brief/MONTHLY_PROMPT.md に書かれた「月報」エディターです。
          そこに書かれた STEP 0 から品質チェックリストまでをすべて遂行してください。

          環境変数で渡されている MONTH_TARGET / MONTH_LABEL を必ず使用すること。

          完了条件:
            - /tmp/monthly.json が MONTHLY_PROMPT.md のスキーマに準拠している
            - /tmp/monthly.html に未解決プレースホルダが残っていない
            - 業界トレンド 5 件以上、中長期戦略 3 件以上
          失敗した場合は理由を明示して終了してください（メール送信は後段ステップが行います）。
          EOF
          )"

          claude --print \
            --permission-mode acceptEdits \
            --allowed-tools "Read,Write,Edit,Bash,WebSearch,WebFetch,Task,Glob,Grep" \
            --max-turns 80 \
            "$PROMPT" 2>&1 | tee /tmp/monthly-claude.log

      - name: Verify generated artifacts
        run: |
          set -e
          for f in /tmp/monthly.json /tmp/monthly.html; do
            if [ ! -s "$f" ]; then
              echo "::error::missing or empty artifact: $f"
              exit 1
            fi
          done
          if grep -E '\{\{[A-Z_]+\}\}' /tmp/monthly.html >/dev/null; then
            echo "::error::unresolved placeholders left in /tmp/monthly.html"
            grep -nE '\{\{[A-Z_]+\}\}' /tmp/monthly.html | head -10
            exit 1
          fi
          python3 - <<'PY'
          import json, sys
          d = json.load(open("/tmp/monthly.json", encoding="utf-8"))
          trends = d.get("industry_trends", {}).get("items", [])
          strat  = d.get("strategy", [])
          if not isinstance(trends, list) or len(trends) < 5:
              print(f"::error::industry_trends.items: must have >=5, got {len(trends) if isinstance(trends, list) else 'non-list'}")
              sys.exit(2)
          if not isinstance(strat, list) or len(strat) < 3:
              print(f"::error::strategy: must have >=3, got {len(strat) if isinstance(strat, list) else 'non-list'}")
              sys.exit(2)
          print("[verify] monthly.json OK")
          PY

      - name: Send monthly email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          FROM_ARG=""
          if [ -n "${FROM_EMAIL:-}" ]; then
            FROM_ARG="--from ${FROM_EMAIL}"
          fi
          # shellcheck disable=SC2086
          python3 scripts/send-resend.py \
            --subject "[月報] メグル ${MONTH_LABEL}" \
            --html-file /tmp/monthly.html \
            --to "${TO_EMAIL}" \
            ${FROM_ARG}

      - name: Keep-alive (touch repo activity if quiet >50d)
        if: github.event_name == 'schedule'
        run: |
          set -e
          # 月次は実行頻度が低いので、特に keep-alive を入念にチェック。
          LAST_COMMIT_TS="$(git log -1 --format=%ct)"
          NOW_TS="$(date +%s)"
          AGE=$(( NOW_TS - LAST_COMMIT_TS ))
          if [ "$AGE" -gt 4320000 ]; then
            git config user.name "meguru-bi-bot"
            git config user.email "bot@meguru-kaitori.local"
            git commit --allow-empty -m "chore: keep-alive ping (monthly-report) [skip ci]"
            for attempt in 1 2 3 4; do
              if git push origin HEAD; then
                echo "keep-alive push ok on attempt $attempt"
                exit 0
              fi
              sleep $((2 ** attempt))
            done
            echo "::warning::keep-alive push failed after retries"
          else
            echo "repo recently active ($AGE seconds ago) — keep-alive not needed"
          fi

      - name: Failure notification (best-effort)
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          set +e
          mkdir -p /tmp
          {
            echo "<h2>[ALERT] monthly-report failed</h2>"
            echo "<p>Month: ${MONTH_LABEL:-unknown} (${MONTH_TARGET:-unknown})</p>"
            echo "<p>Run: <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">${{ github.run_id }}</a></p>"
            echo "<pre style='font-size:12px;background:#f4f5f7;padding:12px;border-radius:6px;white-space:pre-wrap;'>"
            tail -c 60000 /tmp/monthly-claude.log 2>/dev/null | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
            echo "</pre>"
          } > /tmp/monthly-alert.html
          FROM_ARG=""
          if [ -n "${FROM_EMAIL:-}" ]; then FROM_ARG="--from ${FROM_EMAIL}"; fi
          python3 scripts/send-resend.py \
            --subject "[ALERT] monthly-report failed (${MONTH_TARGET:-?})" \
            --html-file /tmp/monthly-alert.html \
            --to "${TO_EMAIL}" \
            ${FROM_ARG} || true
