name: morning-ai

# 受信保証のため複数 schedule で発火する：いずれか 1 つが成功すれば
# 残りは API 経由の冪等性チェックで早期スキップする。
# - 04:17 JST = 19:17 UTC（前日）— 主時刻（ユーザー指定）
# - 04:47 JST = 19:47 UTC（前日）— +30 分のバックアップ
# - 05:17 JST = 20:17 UTC（前日）— +60 分の最終バックアップ（朝刊 08:07 の前に十分終わる）
on:
  schedule:
    - cron: "17 19 * * *"
    - cron: "47 19 * * *"
    - cron: "17 20 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "対象日 (YYYY-MM-DD, 空欄なら今日 JST)"
        required: false
        type: string
      force:
        description: "冪等性チェックを無視して強制実行する"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  # バックアップ schedule は primary をキャンセルせずキューに並ぶ。
  group: morning-ai
  cancel-in-progress: false

permissions:
  contents: write   # keep-alive のための空コミット用
  actions: read     # 冪等性チェックで自身の run 履歴を読むため

jobs:
  ai:
    runs-on: ubuntu-latest
    # 4 ワークフロー統一基準：job 80 分 / Run Claude Code step 50 分。
    timeout-minutes: 80
    env:
      TZ: Asia/Tokyo

    steps:
      - name: Idempotency check (today already succeeded?)
        id: idem
        if: github.event_name == 'schedule' || inputs.force != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const jstOffsetMs = 9 * 60 * 60 * 1000;
            const jstNow = new Date(now.getTime() + jstOffsetMs);
            const jstY = jstNow.getUTCFullYear();
            const jstM = String(jstNow.getUTCMonth() + 1).padStart(2, '0');
            const jstD = String(jstNow.getUTCDate()).padStart(2, '0');
            const sinceIso = new Date(`${jstY}-${jstM}-${jstD}T00:00:00+09:00`).toISOString();
            core.info(`[idem] looking for successful runs of morning-ai.yml since ${sinceIso}`);
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'morning-ai.yml',
              per_page: 30,
              created: `>=${sinceIso}`,
            });
            // 短時間で終わった run は idempotency-skip による擬似 success の可能性が高いので除外する。
            // 実 run は RSS 取得 + Claude 生成 + Resend 送信で最低 5 分以上かかるため、
            // 60 秒未満の run は連鎖スキップ防止のため無視する。
            const ok = data.workflow_runs.filter(r => {
              if (r.id === context.runId) return false;
              if (r.status !== 'completed') return false;
              if (r.conclusion !== 'success') return false;
              const durationSec = (new Date(r.updated_at) - new Date(r.created_at)) / 1000;
              if (durationSec < 60) {
                core.info(`[idem] excluding fast pseudo-success run #${r.run_number} (${durationSec.toFixed(0)}s, likely a skip)`);
                return false;
              }
              return true;
            });
            if (ok.length > 0) {
              const r = ok[0];
              core.notice(`[idem] today already succeeded in run #${r.run_number} (${r.html_url}) — skipping. force=true で再実行可能`);
              core.setOutput('skip', 'true');
            } else {
              core.info(`[idem] no real (>60s) successful run today — proceeding`);
              core.setOutput('skip', 'false');
            }

      - name: Sanity check (required secrets)
        if: steps.idem.outputs.skip != 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          set -e
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::neither CLAUDE_CODE_OAUTH_TOKEN nor ANTHROPIC_API_KEY is set in Secrets"
            exit 1
          fi
          if [ -z "${RESEND_API_KEY:-}" ]; then
            echo "::error::RESEND_API_KEY is not set in Secrets"
            exit 1
          fi
          if [ -z "${TO_EMAIL:-}" ]; then
            echo "::error::TO_EMAIL is not set in Secrets"
            exit 1
          fi
          echo "[sanity] required secrets present"

      - name: Checkout
        if: steps.idem.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Set up Python
        if: steps.idem.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        if: steps.idem.outputs.skip != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        if: steps.idem.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Compute date / weekday / agent-tool (JST)
        id: vars
        if: steps.idem.outputs.skip != 'true'
        run: |
          INPUT_DATE="${{ inputs.target_date }}"
          if [ -n "$INPUT_DATE" ]; then
            TODAY_DATE="$INPUT_DATE"
          else
            TODAY_DATE="$(date +%Y-%m-%d)"
          fi
          WEEKDAY_EN="$(date -d "$TODAY_DATE" +%a)"
          # 曜日別の対象ツール（セクション 7「AIエージェント・自動化ツール比較」用）
          case "$WEEKDAY_EN" in
            Mon) WD_JP="月"; AGENT_TOOL_TODAY="Zapier — 何ができる・料金・向いている人を深掘り" ;;
            Tue) WD_JP="火"; AGENT_TOOL_TODAY="Make — 何ができる・料金・向いている人を深掘り" ;;
            Wed) WD_JP="水"; AGENT_TOOL_TODAY="n8n — 何ができる・料金・向いている人を深掘り" ;;
            Thu) WD_JP="木"; AGENT_TOOL_TODAY="Notion AI — 活用事例" ;;
            Fri) WD_JP="金"; AGENT_TOOL_TODAY="Microsoft Copilot — 活用事例" ;;
            Sat) WD_JP="土"; AGENT_TOOL_TODAY="新興 AI ツール（今週注目の 1 本を実在ツールから選定）" ;;
            Sun) WD_JP="日"; AGENT_TOOL_TODAY="今週の自動化まとめ（過去 7 日のセクション 2 で紹介した事例の要点総括）" ;;
          esac
          MONTH="$(date -d "$TODAY_DATE" +%-m)"
          DAY="$(date -d "$TODAY_DATE" +%-d)"
          TODAY_DATE_JP="${TODAY_DATE}（${WD_JP}）"
          {
            echo "TODAY_DATE=$TODAY_DATE"
            echo "TODAY_DATE_JP=$TODAY_DATE_JP"
            echo "WEEKDAY_EN=$WEEKDAY_EN"
            echo "WD_JP=$WD_JP"
            echo "MONTH=$MONTH"
            echo "DAY=$DAY"
            echo "AGENT_TOOL_TODAY=$AGENT_TOOL_TODAY"
          } >> "$GITHUB_ENV"
          echo "Generating AI 実用通信 for $TODAY_DATE_JP (${MONTH}/${DAY})"
          echo "  AGENT_TOOL_TODAY = $AGENT_TOOL_TODAY"

      - name: Run Claude Code (generate AI 実用通信 artifacts)
        if: steps.idem.outputs.skip != 'true'
        timeout-minutes: 50   # 4 ワークフロー統一：job 80 / step 50 分
        env:
          # CLI は CLAUDE_CODE_OAUTH_TOKEN を優先し、なければ ANTHROPIC_API_KEY を使う。
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TODAY_DATE: ${{ env.TODAY_DATE }}
          TODAY_DATE_JP: ${{ env.TODAY_DATE_JP }}
          WEEKDAY_EN: ${{ env.WEEKDAY_EN }}
          WD_JP: ${{ env.WD_JP }}
          MONTH: ${{ env.MONTH }}
          DAY: ${{ env.DAY }}
          AGENT_TOOL_TODAY: ${{ env.AGENT_TOOL_TODAY }}
        run: |
          set -euo pipefail
          mkdir -p /tmp
          PROMPT="$(cat <<'EOF'
          あなたは AI の実用情報を毎朝届けるプロのエディターです。読者は好奇心旺盛な経営者で、以下だけを求めています：

          ✅ 求めていること：
            ・AI で実際に何ができるか（具体的な事例のみ）
            ・世界で実際に起きていること（ハルシネーション絶対禁止）
            ・自分でも今日から試せる具体的な使い方
            ・業務・生活・仕事が自動化できる具体例
            ・最新の AI ツール（料金・使い方・URL 付き）
            ・詳しい使い方の手順（ステップ形式）
            ・海外で実際に使われている事例
            ・AI で時間・お金を節約した具体的な数字

          ❌ 禁止事項：
            ・特定業種への限定（買取・不動産など禁止）
            ・「〜かもしれません」「〜と思われます」などの曖昧表現
            ・AI で創作したニュース（実際の RSS から取得したものだけ）
            ・抽象的・理論的な説明（具体例のないものは書かない）
            ・古い情報（48 時間以内を優先）

          morning-brief/AI_PROMPT.md に書かれた STEP 0 から品質チェックリストまでをすべて遂行してください。

          環境変数で渡されている TODAY_DATE / TODAY_DATE_JP / WEEKDAY_EN / WD_JP / MONTH / DAY / AGENT_TOOL_TODAY を必ず使用すること。
          特にセクション 7「AIエージェント・自動化ツール比較」は AGENT_TOOL_TODAY の対象に厳密に従う。

          ⚠️ 最重要：
          - 14 本の RSS / Web を全部 fetch すること（Anthropic は WebFetch、それ以外は curl）
          - 実用性・新規性・インパクト の 3 軸で各記事を 0〜5 点でスコアリングし上位 5 本を選ぶ
          - セクション 1 / 2 / 6 / 8 すべてに **出典 URL** を末尾に必ず記載
          - ツール紹介は実在ツールのみ、公式 URL と料金（無料/有料/フリーミアム + 月額）を必ず記載
          - 創作ニュース・架空ツール・曖昧表現は絶対禁止

          完了条件:
            - /tmp/ai.html に未解決プレースホルダが残っていない
            - /tmp/ai.json が AI_PROMPT.md のスキーマ（schema_version 1.3）に準拠
            - 全体 2,000 字以内、8 セクション全部埋まっている
            - セクション 2 が 5 事例（会社名・業務・効果数字・ツール・URL）
            - セクション 5 のプロンプトが 5 本、テーマがバラバラ + 各「使い方のコツ」1 行付き
            - セクション 7 が AGENT_TOOL_TODAY の対象に沿っている
          失敗した場合は理由を明示して終了してください（メール送信は後段ステップが行います）。

          時間配分の目安：14 RSS 取得・スコアリングに 12〜18 分、コンテンツ生成に 25 分、HTML 化と検証に 10 分。
          EOF
          )"

          claude --print \
            --permission-mode acceptEdits \
            --allowed-tools "Read,Write,Edit,Bash,WebSearch,WebFetch,Task,Glob,Grep" \
            --max-turns 60 \
            "$PROMPT" 2>&1 | tee /tmp/ai-claude.log

      - name: Verify generated artifacts
        if: steps.idem.outputs.skip != 'true'
        run: |
          set -e
          for f in /tmp/ai.json /tmp/ai.html; do
            if [ ! -s "$f" ]; then
              echo "::error::missing or empty artifact: $f"
              exit 1
            fi
          done
          if grep -E '\{\{[A-Z_]+\}\}' /tmp/ai.html >/dev/null; then
            echo "::error::unresolved placeholders left in /tmp/ai.html"
            grep -nE '\{\{[A-Z_]+\}\}' /tmp/ai.html | head -10
            exit 1
          fi
          size=$(stat -c%s /tmp/ai.html)
          if [ "$size" -lt 3072 ]; then
            echo "::error::/tmp/ai.html too small: ${size} bytes (<3072 = 3KB)"
            exit 1
          fi
          # 出典 URL の存在チェック
          python3 - <<'PY'
          import json, sys
          d = json.load(open("/tmp/ai.json", encoding="utf-8"))
          def url_ok(u):
              return isinstance(u, str) and (u.startswith("http://") or u.startswith("https://"))
          big = d.get("big_news") or {}
          if not url_ok(big.get("source", "")):
              if "失敗" not in (big.get("summary") or "") and "失敗" not in (big.get("title") or ""):
                  print(f"::warning::big_news.source missing or invalid")
          tool = d.get("tool") or {}
          if tool.get("url") and not url_ok(tool.get("url")):
              print(f"::warning::tool.url invalid: {tool.get('url')!r}")
          overseas = d.get("overseas_case") or {}
          if overseas.get("source") and not url_ok(overseas.get("source")):
              print(f"::warning::overseas_case.source invalid: {overseas.get('source')!r}")
          numbers = d.get("numbers_finding") or {}
          if numbers.get("source") and not url_ok(numbers.get("source")):
              print(f"::warning::numbers_finding.source invalid: {numbers.get('source')!r}")
          agent = d.get("agent_tool") or {}
          if agent.get("url") and not url_ok(agent.get("url")):
              print(f"::warning::agent_tool.url invalid: {agent.get('url')!r}")
          cases = d.get("automation_cases") or []
          if not isinstance(cases, list) or len(cases) < 5:
              print(f"::warning::automation_cases should have 5 items, got {len(cases) if isinstance(cases, list) else 'non-list'}")
          for i, c in enumerate(cases):
              if not url_ok((c or {}).get("source", "")):
                  print(f"::warning::automation_cases[{i}].source missing or invalid")
          rss = d.get("rss_status") or {}
          ok_n = sum(1 for v in rss.values() if v == "ok")
          total_n = len(rss) or 14
          print(f"[verify] ai.json OK char_count={d.get('char_count')} rss_ok={ok_n}/{total_n} top5={len(d.get('top5_used') or [])} agent_tool={d.get('agent_tool_today')}")
          PY

      - name: Send AI 実用通信 email via Resend
        if: steps.idem.outputs.skip != 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          FROM_ARG=""
          if [ -n "${FROM_EMAIL:-}" ]; then
            FROM_ARG="--from ${FROM_EMAIL}"
          fi
          # shellcheck disable=SC2086
          python3 scripts/send-resend.py \
            --subject "⚙️ AI実用通信 | ${MONTH}/${DAY}（${WD_JP}）" \
            --html-file /tmp/ai.html \
            --to "${TO_EMAIL}" \
            ${FROM_ARG}

      - name: Keep-alive (touch repo activity if quiet >50d)
        if: github.event_name == 'schedule' && steps.idem.outputs.skip != 'true'
        run: |
          set -e
          LAST_COMMIT_TS="$(git log -1 --format=%ct)"
          NOW_TS="$(date +%s)"
          AGE=$(( NOW_TS - LAST_COMMIT_TS ))
          if [ "$AGE" -gt 4320000 ]; then
            git config user.name "meguru-bi-bot"
            git config user.email "bot@meguru-kaitori.local"
            git commit --allow-empty -m "chore: keep-alive ping (morning-ai) [skip ci]"
            for attempt in 1 2 3 4; do
              if git push origin HEAD; then
                echo "keep-alive push ok on attempt $attempt"
                exit 0
              fi
              sleep $((2 ** attempt))
            done
            echo "::warning::keep-alive push failed after retries"
          else
            echo "repo recently active ($AGE seconds ago) — keep-alive not needed"
          fi

      - name: Failure notification (best-effort)
        if: failure() && steps.idem.outputs.skip != 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          set +e
          mkdir -p /tmp
          {
            echo "<h2>[ALERT] morning-ai failed</h2>"
            echo "<p>Date: ${TODAY_DATE:-unknown}</p>"
            echo "<p>Run: <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">${{ github.run_id }}</a></p>"
            echo "<pre style='font-size:12px;background:#f4f5f7;padding:12px;border-radius:6px;white-space:pre-wrap;'>"
            tail -c 60000 /tmp/ai-claude.log 2>/dev/null | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
            echo "</pre>"
          } > /tmp/ai-alert.html
          FROM_ARG=""
          if [ -n "${FROM_EMAIL:-}" ]; then FROM_ARG="--from ${FROM_EMAIL}"; fi
          python3 scripts/send-resend.py \
            --subject "[ALERT] morning-ai failed (${TODAY_DATE:-?})" \
            --html-file /tmp/ai-alert.html \
            --to "${TO_EMAIL}" \
            ${FROM_ARG} || true
